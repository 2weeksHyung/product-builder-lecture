<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 추첨 사이트</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f9fafb;
        --muted: #9ca3af;
        --accent: #f59e0b;
        --accent-2: #ef4444;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #111827, #1f2937);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .app {
        width: min(900px, 100%);
        background: rgba(17, 24, 39, 0.95);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
      }

      .button-wrap {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 24px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      button:hover { transform: translateY(-2px); }

      .draw-btn {
        background: linear-gradient(135deg, var(--accent), #fbbf24);
        color: #111827;
        box-shadow: 0 10px 20px rgba(245, 158, 11, 0.25);
      }

      .reset-btn {
        background: #374151;
        color: var(--text);
      }

      .result-box {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
        margin: 12px 0 24px;
      }

      .ball {
        aspect-ratio: 1;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 1.15rem;
        font-weight: 800;
        color: #111827;
        background: linear-gradient(135deg, #fde68a, #f59e0b);
        box-shadow: inset 0 -4px 6px rgba(0,0,0,0.15);
      }

      .ball.bonus {
        background: linear-gradient(135deg, #fecaca, var(--accent-2));
        color: white;
      }

      .history {
        border-top: 1px solid rgba(255,255,255,0.1);
        padding-top: 20px;
      }

      .history h2 {
        font-size: 1.05rem;
        margin: 0 0 12px;
      }

      .history ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 8px;
      }

      .history li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,0.04);
        border-radius: 14px;
        padding: 10px 14px;
        color: var(--muted);
      }

      .history .numbers {
        color: var(--text);
        font-weight: 600;
      }

      @media (max-width: 640px) {
        .app { padding: 20px; }
        .result-box { grid-template-columns: repeat(3, 1fr); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>🎲 로또 추첨 사이트</h1>
      <p class="subtitle">행운의 번호를 뽑아보세요. 오늘의 추첨 결과를 확인해보세요.</p>

      <div class="button-wrap">
        <button class="draw-btn" onclick="drawLotto()">번호 뽑기</button>
        <button class="reset-btn" onclick="resetResults()">초기화</button>
      </div>

      <div id="resultArea" class="result-box">
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
      </div>

      <div class="history">
        <h2>최근 추첨 기록</h2>
        <ul id="historyList"></ul>
      </div>
    </div>

    <script>
      const historyList = document.getElementById('historyList');
      const resultArea = document.getElementById('resultArea');
      const history = [];

      function drawLotto() {
        const numbers = new Set();
        while (numbers.size < 6) {
          numbers.add(Math.floor(Math.random() * 45) + 1);
        }

        const sortedNumbers = [...numbers].sort((a, b) => a - b);
        const bonus = Math.floor(Math.random() * 45) + 1;
        const finalNumbers = [...sortedNumbers];

        resultArea.innerHTML = '';
        finalNumbers.forEach((number) => {
          const ball = document.createElement('div');
          ball.className = 'ball';
          ball.textContent = number;
          resultArea.appendChild(ball);
        });

        const bonusBall = document.createElement('div');
        bonusBall.className = 'ball bonus';
        bonusBall.textContent = `+${bonus}`;
        resultArea.appendChild(bonusBall);

        history.unshift({ numbers: finalNumbers, bonus });
        if (history.length > 5) history.length = 5;
        renderHistory();
      }

      function renderHistory() {
        historyList.innerHTML = '';
        history.forEach((item) => {
          const li = document.createElement('li');
          li.innerHTML = `<span class="numbers">${item.numbers.join(', ')} + ${item.bonus}</span><span>최근 추첨</span>`;
          historyList.appendChild(li);
        });
      }

      function resetResults() {
        resultArea.innerHTML = `
          <div class="ball">?</div>
          <div class="ball">?</div>
          <div class="ball">?</div>
          <div class="ball">?</div>
          <div class="ball">?</div>
          <div class="ball">?</div>
        `;
        history.length = 0;
        renderHistory();
      }

      renderHistory();
    </script>
  </body>
</html>
